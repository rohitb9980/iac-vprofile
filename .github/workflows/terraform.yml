name: "vprofile IAC"

on:
  push:
    branches:
      - main
      - stage
    paths: 
      - 'terraform/**'
  pull_request:
    branches:
      - main
    paths: 
      - 'terraform/**'
  workflow_dispatch: # Added this so you can test it manually from the UI

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  BUCKET_NAME: ${{ secrets.BUCKET_TF_STATE }}
  AWS_REGION: us-east-1
  EKS_CLUSTER0: vprofile-eks

jobs:
  terraform:
    name: "Apply Terraform"
    runs-on: ubuntu-latest
    defaults: # Fixed typo from "defualts"
      run:
        shell: bash
        working-directory: ./terraform

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v2

      - name: "Initialize Terraform"
        id: terraform_init
        run: terraform init -backend-config="bucket=${{ env.BUCKET_NAME }}"
        
      - name: "Terraform FORMAT check"
        run: terraform fmt -check

      - name: "Terraform validate check"
        run: terraform validate

      - name: "Terraform Plan check"
        id: plan
        run: terraform plan -no-color -input=false -out planfile
        continue-on-error: true

      - name: "Terraform Plan Status"
        if: steps.plan.outcome == 'failure'
        run: exit 1